<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="image.css">
</head>
<body>

    <div class="slider">
        <div class="slides">
            <img class="slide" src="na.png" alt="na">
            <img class="slide" src="auto.png" alt="auto">
            <img class="slide" src="easy.png" alt="easy">
            <img class="slide" src="normal.png" alt="normal">
            <img class="slide" src="hard.png" alt="hard">
            <img class="slide" src="harder.png" alt="harder">
            <img class="slide" src="insane.png" alt="insane">
            <img class="slide" src="easyDemon.png" alt="easyDemon">
            <img class="slide" src="mediumDemon.png" alt="mediumDemon">
            <img class="slide" src="hardDemon.png" alt="hardDemon">
            <img class="slide" src="insaneDemon.png" alt="insaneDemon">
            <img class="slide" src="extremeDemon.png" alt="extremeDemon">
        </div>
        <button class="prev" onclick="prevSlide()">&#10094</button>
        <button class="next" onclick="nextSlide()">&#10095</button>
    </div>

    <script src="image.js"></script>
</body>
</html>
