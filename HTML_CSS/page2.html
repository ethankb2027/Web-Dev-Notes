<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
</head>

<body>
    <h1 id="heyyy">This is page 2</h1>    
    
    <button onclick="doSomething()" style="background-color: beige; font-size: 50px;">change the message</button>

    <script>
        function doSomething(){
            document.getElementById("heyyy").innerHTML = "heyyyyyyyy that tickled";
        }
    </script>

    <br><hr><br>

    <!-- FORMS📃 -->

    <form action="index.php" method="POST" enctype="multipart/form-data">

        <label for="username">username: </label>
        <input type="text" id="username" minlength="5" maxlength="10" placeholder="usernameHere" required><br>
      
        <label for="password">password: </label>
        <input type="password" id="password" minlength="5" maxlength="10" placeholder="pass"><br>
      
        <label for="email">email: </label>
        <input type="email" id="email" minlength="5" maxlength="10" placeholder="name.number@osu.edu"><br>
        
        <label for="phone">phone number: </label>
        <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>
        
        <label for="bday">birthdate: </label>
        <input type="date" id="bday"><br>
        
        <label for="age">age: </label>
        <input type="number" id="age" min="0" max="99" value="1"><br>
        
        <label>title: </label>
        <label for="Mr.">Mr.: </label>
        <input type="radio" id="Mr." value="Mr." name="group">
        <label for="Mrs.">Mrs.: </label>
        <input type="radio" id="Mrs." value="Mrs." name="group">
        <label for="Master">Master: </label>
        <input type="radio" id="Master" value="Master" name="group"><br>

        <label for="payment">payment: </label>
        <select id="payment">
            <option value="Card">Card</option>
            <option value="Cash">Cash</option>
            <option value="Bitcoin">Bitcoin</option>
        </select><br>

        <label for="human">are you a human? </label>
        <input type="checkbox" id="human"><br>

        <label for="feedback">comments: </label>
        <textarea id="feedback" rows="5" cols="5"></textarea><br>

        <label for="doc">Share image of back of credit card: </label>
        <input type="file" id="doc" accept="image/png, image/gif"><br>

        <input type="reset"><br>
        <input type="submit">

    </form>

</body>

</html>
