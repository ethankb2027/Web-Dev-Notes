
<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Ethan Bui">
        <meta name="description" content="My attempt at trying to recreate Dave Gray's project.">

        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="style.css" type="text/css">
        
        <title>Contact Us - LTS</title>
    </head>
    
    <body>
        <header>
            <h1>Contact Us</h1>

            <nav aria-label="primary-navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#about">About <abbr title="Little Taco Shop">LTS</abbr></a></li>
                    <li><a href="index.html#menu">Our Menu</a></li>
                    <li><a href="hours.html">Store Hours</a></li>
                </ul>
            </nav>

            <figure>
                <img src="img/tacos_close_up_400x260.png" alt="Tacos close up" title="This is food we serve." width="400" height="260">
                <figcaption>Little Taco Shop Tacos</figcaption>
            </figure>
        </header>

        <hr>

        <main>
            <section>
                <h2>Our Contact Form</h2>

                <form action="https://httpbin.org/post" method="post">
                    <fieldset>
                        <legend>Send Us A Message</legend>

                        <p>
                            <label for="fullName">Name:</label>
                            <input type="text" name="fullName" id="fullName" placeholder="your name" autocomplete="on" required autofocus>
                        </p>

                        <p>
                            <label for="emailName">Email:</label>
                            <input type="email" name="emailName" id="emailName" placeholder="your email" autocomplete="on" required>
                        </p>

                        <p>
                            <label for="message">Your Message:</label>
                            <br>
                            <textarea name="message" id="message" cols="30" rows="10" placeholder="Type your message here" required></textarea>
                        </p>
                    </fieldset>

                    <button type="submit">Send</button>
                    <button type="reset">Reset</button>
                </form>
            </section>

            <section>
                <h2>Our Location</h2>
                
                <address>
                    555 Taco Temptation Lane, Suite T<br>
                    Kansas City, MO 55555-5555<br>
                    <br>
                    Phone: <a href="tel:+5555555555">555-555-5555</a>
                </address>

                <p><a href="#">Back to Top</a></p>
            </section>
        </main>

        <hr>

        <footer>
            <p>Copyright &copy; The Little Taco Shop</p>
        </footer>
    </body>
</html>
