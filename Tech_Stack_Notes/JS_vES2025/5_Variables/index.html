<!--
  In this lesson, learned...
    ...variables = a way to save values
    ...re-assign a variable
    ...created the Cart Quantity feature
    ...shortcuts for re-assigning a variable
    ...naming conventions and best practices
    ...3 ways to create a variable: let, const, var
-->

<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JS Variables</title>
  </head>

  <body>
    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`)">
      Show Quantity
    </button>
    <button
      onclick="
        cartQuantity++;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Add to Cart
    </button>
    <button
      onclick="
        cartQuantity += 2;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      +2
    </button>
    <button
      onclick="
        cartQuantity += 3;
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      +3
    </button>
    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>

    <script>
      let cartQuantity = 0;
    </script>
  </body>
</html>
